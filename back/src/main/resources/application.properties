# ==========================================
# CONFIGURACIÓN DE LA BASE DE DATOS (MySQL)
# ==========================================
# El parámetro 'createDatabaseIfNotExist=true' es una excelente práctica:
# le indica a MySQL que cree automáticamente la base de datos 'abyss_reader_db' si no existe.
spring.datasource.url=jdbc:mysql://localhost:3306/abyss_reader_db?createDatabaseIfNotExist=true&serverTimezone=UTC&useSSL=false
spring.datasource.username=root
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==========================================
# CONFIGURACIÓN DE JPA / HIBERNATE
# ==========================================
# 'update' analiza tus clases de Java con @Entity y crea o actualiza las tablas en MySQL automáticamente.
spring.jpa.hibernate.ddl-auto=update

# Le dice a Hibernate qué lenguaje específico de SQL hablar (en este caso, MySQL)
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# BUENA PRÁCTICA PARA APRENDER: Muestra en la consola de comandos las consultas SQL reales
# que Hibernate genera por debajo. Te ayudará a entender profundamente cómo funciona JPA.
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ==========================================
# CONFIGURACIÓN DEL SERVIDOR
# ==========================================
# Puerto por defecto donde correrá tu API de Abyss Reader
server.port=8080

# ==========================================
# CONFIGURACIÓN JWT
# ==========================================
# Clave secreta (debe ser larga y compleja en producción)
# Clave secreta JWT en Base64 válido (256 bits / 32 bytes).
# IMPORTANTE: En producción, reemplazar por una clave generada de forma segura.
# Generada con: Base64.getEncoder().encodeToString(new byte[32]) equivalente seguro.
jwt.secret=YWJ5c3NyZWFkZXJfc2VjcmV0X2tleV9zdXBlcl9zZWd1cm9fMjAyNl8h
# Expiración en milisegundos (ejemplo: 86400000 ms = 24 horas)
jwt.expiration=86400000

# ==========================================
# CONFIGURACIÓN GOOGLE CLOUD STORAGE
# ==========================================
# Nombre del bucket de GCS donde se almacenarán las páginas de los capítulos.
# La autenticación se realiza via la variable de entorno GOOGLE_APPLICATION_CREDENTIALS
# que debe apuntar a: back/abyss-reader-Credentials.json
gcs.bucket-name=abyss-reader-assets

# ==========================================
# CONFIGURACIÓN MULTIPART (subida de archivos)
# ==========================================
# Tamaño máximo por archivo (50MB para páginas de alta calidad)
spring.servlet.multipart.max-file-size=50MB
# Tamaño máximo total de la petición (500MB para capítulos con muchas páginas)
spring.servlet.multipart.max-request-size=500MB