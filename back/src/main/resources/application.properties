# ==========================================
# CONFIGURACIÓN DE LA BASE DE DATOS (PostgreSQL)
# ==========================================
#  Configuración de PostgreSQL en Neon
# Fíjate que le agregamos "jdbc:" al principio y quitamos el usuario y contraseña de la URL
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/abyss_db}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=org.postgresql.Driver

# Configuración de Hibernate
# UPDATE: actualiza las tablas si hay cambios en tus entidades, o las crea si no existen.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# ==========================================
# CONFIGURACIÓN DEL SERVIDOR
# ==========================================
# Puerto por defecto donde correrá tu API de Abyss Reader
server.port=${PORT:8080}

# ==========================================
# CONFIGURACIÓN JWT
# ==========================================
# Clave secreta (debe ser larga y compleja en producción)
# Clave secreta JWT en Base64 válido (256 bits / 32 bytes).
# IMPORTANTE: En producción, reemplazar por una clave generada de forma segura.
# Generada con: Base64.getEncoder().encodeToString(new byte[32]) equivalente seguro.
jwt.secret=${JWT_SECRET:YWJ5c3NyZWFkZXJfc2VjcmV0X2tleV9zdXBlcl9zZWd1cm9fMjAyNl8h}
# Expiración en milisegundos (ejemplo: 86400000 ms = 24 horas)
jwt.expiration=2592000000
# Expiración para cuentas demo efímeras: 1 hora = 3600000 ms
jwt.demo.expiration=3600000

# ==========================================
# CONFIGURACIÓN GOOGLE CLOUD STORAGE
# ==========================================
# Nombre del bucket de GCS donde se almacenarán las páginas de los capítulos.
# La autenticación se realiza via la variable de entorno GOOGLE_APPLICATION_CREDENTIALS
# que debe apuntar a: back/abyss-reader-Credentials.json
gcs.bucket-name=abyss-reader-assets

# ==========================================
# CONFIGURACIÓN MULTIPART (subida de archivos)
# ==========================================
# Tamaño máximo por archivo (50MB para páginas de alta calidad)
spring.servlet.multipart.max-file-size=50MB
# Tamaño máximo total de la petición (500MB para capítulos con muchas páginas)
spring.servlet.multipart.max-request-size=500MB

# ==========================================
# CONFIGURACIÓN DEL POOL DE CONEXIONES (HIKARI)
# ==========================================
# Dejamos un "hilo" vivo para que soporte el primer impacto
spring.datasource.hikari.minimum-idle=1
#dale loco daleeeeeeeeeeeeeeeeeeeeee

# Tiempo máximo que una conexión puede estar inactiva antes de cerrarse (2 minutos = 120000ms)
spring.datasource.hikari.idle-timeout=120000

# Le damos 30 segundos de paciencia para que Neon despierte sin crashear
spring.datasource.hikari.connection-timeout=30000

# Tiempo máximo de vida de una conexión en el pool (10 minutos = 600000ms)
spring.datasource.hikari.max-lifetime=600000

# Tamaño máximo del pool de conexiones para soportar alta concurrencia
spring.datasource.hikari.maximum-pool-size=25